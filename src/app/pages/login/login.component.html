<section class="login text-second text-center pt-16">
    <div class=" m-auto grid lg:grid-cols-2 gap-20 pt-2">
        <div class="md:w-2/3 lg:w-full m-auto py-6 lg:px-12">

            <h1 class="text-3xl font-semibold main-head my-3">Welcome Back</h1>
            <p class="text-gray-600">Resume Your High-performance Journey .</p>
            <form action="" class="text-start p-6 " [formGroup]="loginForm">
                <div class="mb-3">
                    <label for="email" class="block  mb-1 text-sm font-medium text-gray-600">Email:</label>
                    <input type="Email" id="email"
                        class="bg-white rounded-xl focus:shadow-sm focus:shadow-prime border-prime text-heading text-sm rounded-base focus:border-none  block w-full px-3 py-2.5 shadow-xs placeholder:text-gray-500"
                        placeholder="amirfaizy11@gmail.com" required />
                </div>
                <div class="">
                    <div class="flex justify-between mb-1">
                        <label for="password" class="block  text-sm font-medium text-gray-600">Password :</label>
                        <a routerLink="/auth/forgot-password" class="text-end text-prime font-semibold">Forget Password?</a>
                    </div>
                    <input type="password" id="password"
                        class="bg-white rounded-xl focus:shadow-sm focus:shadow-prime border-prime text-heading text-sm rounded-base focus:border-none  block w-full px-3 py-2.5 shadow-xs placeholder:text-gray-500"
                        placeholder="amirF#2100" required />
                </div>


                <button (click)="submitLogin()" class="w-full text-white text-xl px-2 py-3 rounded-xl bg-prime mt-5">login</button>
                <app-repassword [loginPage]="true"></app-repassword>
            </form>
        </div>
        <div class="quate-img relative text-start hidden lg:block">
            <div class="quate-text p-4 bg-[#14263F] border-[.3px] border-gray-200 rounded-2xl w-1/2 lg:absolute   bottom-16 start-1/2 -translate-x-1/2">
                <i class="fa-solid fa-quote-right text-prime text-2xl"></i>
                <q class="font-semibold  text-white text-2xl block">Precision is the foundation of peak performance</q>
                <p class="text-gray-200 pt-4"><span class="pe-2">-</span> SmartFit CORE PHILOSPHY</p>
            </div>
        </div>
    </div>
</section>
