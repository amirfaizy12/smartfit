<section class="login text-second text-start pt-16">
    <div class="m-auto grid lg:grid-cols-2 gap-20 pt-2">
        <div class="md:w-2/3 lg:w-[90%] m-auto py-12 lg:px-12">

            <h1 class="text-3xl font-semibold main-head my-3">Reset Password</h1>
            <p class="text-gray-600">Enter Your email address and we'll send you a link to reset your password</p>

            <form [formGroup]="verifyForm" (ngSubmit)="submitCode()" class="text-start mt-10">

                <div class="flex justify-start gap-3 mb-8">

                    <input #input1 formControlName="code1" type="text" maxlength="1"
                        (input)="moveToNext($event, input2)" (paste)="onPaste($event)" class="otp-input size-12 flex justify-center items-center rounded-xl" />

                    <input #input2 formControlName="code2" type="text" maxlength="1"
                        (keyup)="moveToNext($event, input3, input1)" class="otp-input size-12 flex justify-center items-center rounded-xl" />

                    <input #input3 formControlName="code3" type="text" maxlength="1"
                        (keyup)="moveToNext($event, input4, input2)" class="otp-input size-12 flex justify-center items-center rounded-xl" />

                    <input #input4 formControlName="code4" type="text" maxlength="1"
                        (keyup)="moveToNext($event, input5, input3)" class="otp-input size-12 flex justify-center items-center rounded-xl" />

                    <input #input5 formControlName="code5" type="text" maxlength="1"
                        (keyup)="moveToNext($event, input6, input4)" class="otp-input size-12 flex justify-center items-center rounded-xl" />

                    <input #input6 formControlName="code6" type="text" maxlength="1"
                        (keyup)="moveToNext($event, undefined, input5)" class="otp-input size-12 flex justify-center items-center rounded-xl" />

                </div>

                <button type="submit" class="w-full text-white text-xl px-2 py-3 rounded-xl bg-prime my-6">
                    Verify Code
                </button>

            </form>
        </div>

        <div class="quate-img relative text-start hidden lg:block min-h-[calc(100vh-100px)]">
            <div
                class="quate-text p-4 bg-[#14263F] border-[.3px] border-gray-200 rounded-2xl w-1/2 lg:absolute bottom-16 start-1/2 -translate-x-1/2">
                <i class="fa-solid fa-quote-right text-prime text-2xl"></i>
                <q class="font-semibold text-white text-2xl block">Your body can stand almost anything. It's your mind that you have to convince.</q>
                <p class="text-gray-200 pt-4"><span class="pe-2">-</span> Elite Performance Protocol</p>
            </div>
        </div>
    </div>
</section>
