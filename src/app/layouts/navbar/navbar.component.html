<nav [class]="
    isScrolled ? 'fixed w-full bg-second/95 text-gray-300' : 'absolute lg:w-[95%] md:w-[90%] sm:w-[85%] w-[80%] bg-white/90 mt-7 rounded-3xl'
    " class="     mx-auto z-20 top-0  left-0 right-0     ">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a routerLink="" class="flex items-center space-x-3 rtl:space-x-reverse">
      <img src="/logo.png" class="h-10 rounded-full" alt="Flowbite Logo" />
      <span class="self-center text-2xl uppercase text-heading font-bold whitespace-nowrap">Smart<span class="text-prime">Fit</span></span>
    </a>
    <button data-collapse-toggle="navbar-default" type="button"
      class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
      aria-controls="navbar-default" aria-expanded="false">
      <span class="sr-only">Open main menu</span>
      <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
        viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
      </svg>
    </button>
    <div class="hidden w-full md:flex md:flex-1 md:items-center md:justify-between md:w-auto" id="navbar-default">

      <!-- Nav Links — في النص -->
      <ul
        class="font-medium flex flex-col p-4 md:p-0 mt-4  md:items-center rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-2 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary md:mx-auto">
        <li><a routerLink="/home" routerLinkActive="active-btn-nav" [class]="isScrolled ? 'scrolled' : 'notscrolled'"
            class="block py-2 px-3 bg-brand rounded md:text-f" aria-current="page">Home</a></li>
        <li><a routerLink="/ai" routerLinkActive="active-btn-nav"
            class="block py-2 px-3 text-heading rounded scrolled hover:bg-neutral-tertiary md:border-0 md:hover:text-f">AI</a>
        </li>
        <li><a routerLink="/dashboard" routerLinkActive="active-btn-nav"
            class="block py-2 px-3 text-heading rounded scrolled hover:bg-neutral-tertiary md:border-0 md:hover:text-f">Dashboard</a>
        </li>
        <li><a routerLink="/contact" routerLinkActive="active-btn-nav"
            class="block py-2 px-3 text-heading rounded scrolled hover:bg-neutral-tertiary md:border-0 md:hover:text-f">Contact</a>
        </li>
        <li><a routerLink="/profile" routerLinkActive="active-btn-nav"
            class="block py-2 px-3 text-heading rounded scrolled hover:bg-neutral-tertiary md:border-0 md:hover:text-f">Profile</a>
        </li>
      </ul>

      <!-- Auth Buttons — في الآخر -->
      <ul
        class="font-medium flex flex-col p-4 md:p-0 mt-2  rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-2 md:items-center rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary">
        @if (!isAuthenticated()) {
        <li><a routerLink="/auth/login" routerLinkActive="active-btn-nav"
            class="block py-2 px-3 text-heading rounded scrolled hover:bg-neutral-tertiary md:border-0 md:hover:text-f">Login</a>
        </li>
        <li><a routerLink="/auth/register" routerLinkActive="active-btn-nav"
            class="block py-2 px-3 text-heading rounded scrolled hover:bg-neutral-tertiary md:border-0 md:hover:text-f">Register</a>
        </li>
        } @else {
        <li><button type="button" (click)="logout()"
            class="block main-btn text-heading rounded hover:bg-neutral-tertiary px-2 py-2">LogOut</button>
        </li>
        }

      </ul>

    </div>

  </div>
</nav>
